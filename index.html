<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #111111;
            --panel-bg: #f9f9f9;
            --border-color: #cccccc;
            --button-bg: #0066cc;
            --button-text: #ffffff;
        }

        #theme-toggle {
            display: none;
        }

        #theme-toggle:checked ~ .site-wrapper {
            --bg-color: #121212;
            --text-color: #eeeeee;
            --panel-bg: #1e1e1e;
            --border-color: #333333;
            --button-bg: #005bb5;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .site-wrapper {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--panel-bg);
        }

        .brand {
            font-size: 18px;
            font-weight: bold;
        }

        .theme-label {
            cursor: pointer;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            font-size: 14px;
            user-select: none;
        }

        .main-content {
            display: flex;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            gap: 40px;
        }

        .controls {
            flex: 1;
            max-width: 400px;
            background-color: var(--panel-bg);
            padding: 25px;
            border: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: bold;
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--button-bg);
            color: var(--button-text);
            border: none;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .preview-area {
            flex: 2;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .canvas-container {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--border-color);
        }
    </style>
</head>
<body>

    <input type="checkbox" id="theme-toggle">

    <div class="site-wrapper">
        <header>
            <div class="brand">Meme Maker</div>
            <label for="theme-toggle" class="theme-label">Toggle Dark Mode</label>
        </header>

        <div class="main-content">
            <div class="controls">
                <div class="form-group">
                    <label for="image-upload">Upload Image</label>
                    <input type="file" id="image-upload" accept="image/*">
                </div>

                <div class="form-group">
                    <label for="top-text">Top Text</label>
                    <input type="text" id="top-text" placeholder="Enter top text">
                </div>

                <div class="form-group">
                    <label for="bottom-text">Bottom Text</label>
                    <input type="text" id="bottom-text" placeholder="Enter bottom text">
                </div>

                <button type="button">Update Image</button>
            </div>

            <div class="preview-area">
                <div class="canvas-container">
                    <span>Image Preview</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
